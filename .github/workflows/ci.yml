name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: Lint & types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  e2e:
    name: Playwright e2e (staff gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: test-anon-key

  # Deploy to Cloudflare Workers on every green push to main. The build stamps the service worker
  # with the commit SHA (scripts/stamp-sw.mjs), so each deploy gets a fresh cache that purges the
  # previous one. No-ops (stays green) until the Cloudflare secrets below are configured.
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: [checks, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build & deploy
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN not set — skipping deploy. Add the repo secrets to enable auto-deploy."
            exit 0
          fi
          npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
